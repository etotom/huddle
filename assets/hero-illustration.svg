<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9fa"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- Floating cards/elements -->
  <g filter="url(#shadow)">
    <!-- Main central card -->
    <rect x="150" y="120" width="300" height="160" rx="20" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    
    <!-- Content inside main card -->
    <g opacity="0.8">
      <!-- User avatars -->
      <circle cx="190" cy="160" r="15" fill="#667eea" opacity="0.9"/>
      <circle cx="220" cy="160" r="15" fill="#764ba2" opacity="0.9"/>
      <circle cx="250" cy="160" r="15" fill="#f093fb" opacity="0.9"/>
      <circle cx="280" cy="160" r="15" fill="#4facfe" opacity="0.9"/>
      
      <!-- Speech bubbles -->
      <path d="M200 190 L220 210 L260 210 L280 190 L260 190 L240 210 L220 190 Z" fill="white" opacity="0.9"/>
      <path d="M240 220 L260 240 L300 240 L320 220 L300 220 L280 240 L260 220 Z" fill="white" opacity="0.9"/>
      
      <!-- Text lines -->
      <rect x="200" y="200" width="40" height="4" rx="2" fill="#667eea" opacity="0.6"/>
      <rect x="200" y="208" width="60" height="4" rx="2" fill="#764ba2" opacity="0.6"/>
      <rect x="260" y="230" width="30" height="4" rx="2" fill="#f093fb" opacity="0.6"/>
      <rect x="260" y="238" width="50" height="4" rx="2" fill="#4facfe" opacity="0.6"/>
    </g>
    
    <!-- Title text -->
    <text x="300" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#333" opacity="0.8">Сообщество</text>
  </g>
  
  <!-- Floating elements around -->
  <g filter="url(#softShadow)">
    <!-- Left floating card -->
    <rect x="50" y="80" width="120" height="80" rx="15" fill="white" fill-opacity="0.9" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <circle cx="80" cy="120" r="20" fill="#667eea" opacity="0.8"/>
    <text x="110" y="110" font-family="Arial, sans-serif" font-size="12" fill="#333">Голос</text>
    <text x="110" y="125" font-family="Arial, sans-serif" font-size="12" fill="#666">Общение</text>
    
    <!-- Right floating card -->
    <rect x="430" y="60" width="120" height="80" rx="15" fill="white" fill-opacity="0.9" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <circle cx="460" cy="100" r="20" fill="#764ba2" opacity="0.8"/>
    <text x="490" y="90" font-family="Arial, sans-serif" font-size="12" fill="#333">Текстовые</text>
    <text x="490" y="105" font-family="Arial, sans-serif" font-size="12" fill="#333">Чаты</text>
    
    <!-- Bottom left card -->
    <rect x="60" y="260" width="140" height="90" rx="15" fill="white" fill-opacity="0.9" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <circle cx="95" cy="305" r="22" fill="#f093fb" opacity="0.8"/>
    <text x="130" y="295" font-family="Arial, sans-serif" font-size="12" fill="#333">Видео-</text>
    <text x="130" y="310" font-family="Arial, sans-serif" font-size="12" fill="#333">трансляции</text>
    
    <!-- Bottom right card -->
    <rect x="400" y="280" width="140" height="90" rx="15" fill="white" fill-opacity="0.9" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <circle cx="435" cy="325" r="22" fill="#4facfe" opacity="0.8"/>
    <text x="470" y="315" font-family="Arial, sans-serif" font-size="12" fill="#333">Реальное</text>
    <text x="470" y="330" font-family="Arial, sans-serif" font-size="12" fill="#333">Время</text>
  </g>
  
  <!-- Connection lines -->
  <g opacity="0.3">
    <line x1="150" y1="200" x2="50" y2="120" stroke="#ffffff" stroke-width="2" stroke-dasharray="5 5"/>
    <line x1="450" y1="200" x2="550" y2="100" stroke="#ffffff" stroke-width="2" stroke-dasharray="5 5"/>
    <line x1="180" y1="280" x2="120" y2="160" stroke="#ffffff" stroke-width="2" stroke-dasharray="5 5"/>
    <line x1="420" y1="320" x2="360" y2="280" stroke="#ffffff" stroke-width="2" stroke-dasharray="5 5"/>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.2">
    <circle cx="100" cy="50" r="5" fill="white"/>
    <circle cx="500" cy="40" r="7" fill="white"/>
    <circle cx="30" cy="350" r="4" fill="white"/>
    <circle cx="570" cy="360" r="6" fill="white"/>
    <circle cx="200" cy="30" r="3" fill="white"/>
    <circle cx="400" cy="370" r="3" fill="white"/>
  </g>
  
  <!-- Shine effect -->
  <ellipse cx="350" cy="150" rx="80" ry="20" fill="white" fill-opacity="0.1" transform="rotate(-20 350 150)"/>
</svg>