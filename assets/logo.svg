<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="20" cy="20" r="18" fill="url(#logoGradient)" filter="url(#shadow)"/>
  
  <!-- Inner design elements -->
  <g opacity="0.9">
    <!-- Main hexagon shape -->
    <polygon points="20,8 32,14 32,26 20,32 8,26 8,14" 
             fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    
    <!-- Central dot -->
    <circle cx="20" cy="20" r="4" fill="white" fill-opacity="0.8"/>
    
    <!-- Connection lines -->
    <line x1="20" y1="12" x2="20" y2="16" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="24" x2="20" y2="28" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="20" x2="18" y2="20" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="20" x2="26" y2="20" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Outer connection dots -->
    <circle cx="12" cy="16" r="2" fill="white" fill-opacity="0.7"/>
    <circle cx="28" cy="16" r="2" fill="white" fill-opacity="0.7"/>
    <circle cx="12" cy="24" r="2" fill="white" fill-opacity="0.7"/>
    <circle cx="28" cy="24" r="2" fill="white" fill-opacity="0.7"/>
  </g>
  
  <!-- Subtle shine effect -->
  <ellipse cx="24" cy="16" rx="6" ry="3" fill="white" fill-opacity="0.1" transform="rotate(-30 24 16)"/>
</svg>